<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어르신께 드리는 소중한 편지</title>
    <style>
        body { margin: 0; background-color: #fef9e7; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
       .mobile-card { width: 90%; max-width: 400px; background: white; border: 15px solid #f39c12; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
       .photo-area { width: 100%; height: 200px; background: #eee; border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        h1 { color: #e67e22; font-size: 1.8em; margin-bottom: 20px; }
        p { font-size: 1.1em; line-height: 1.6; color: #5d4037; font-weight: bold; }
       .highlight-text { color: #c0392b; font-size: 1.2em; }
       .footer-note { background: #fdf2e9; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="mobile-card">
        <div class="photo-area">
            <img src="seahwa_haenyeo_old.jpg" alt="세화리 바다" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1>"삼춘, 폭삭 속았수다!"</h1>
        <p>
            가마리 갯머리 바당에서<br>
            한평생 자식덜 키와낸 삼춘,<br>
            그 고생해온 이야기가<br>
            이제는 제주의 <span class="highlight-text">보물</span>이우다. [5, 9]<br><br>
            삼춘의 소중한 인생 이야기를<br>
            예쁜 책으로 남기고 싶어서<br>
            찾아뵈려 합니다.
        </p>
        <div class="footer-note">
            🎁 함께해주시는 어르신께는<br>
            <b>감사의 선물(상품권)</b>을 드립니다.<br>
            - 세화리 기록 추진팀 드림 -
        </div>
    </div>
</body>
</html>
