<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어르신께 드리는 소중한 편지</title>
    <link rel="stylesheet" href="../../resource/style_popupcard.css">
</head>
<body>
    <div class="mobile-card" id="capture-area">
        <div class="photo-area">
            <img src="../../resource/img/pyoseon-myeon-sehwa.jpg" alt="세화리 바다" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1>"삼춘, 폭삭 속았수다!"</h1>
        <p>
            유네스코 인류무형문화유산 제주해녀<br>
            가마리 갯머리 바당에서<br>
            한평생 자식덜 키와낸 삼춘,<br>
            그 이야기도 문화유산입니다<div class=""></div>
            제주의 <span class="highlight-text">보물</span>인<br>
            삼춘의 소중한 인생 이야기를<br>
            책으로 유산으로 남기고자<br>
            찾아뵈려 합니다.
        </p>
        <div class="footer-note">
            🎁 함께해주시는 어르신께는<br>
            <b>감사의 선물(상품권)</b>을 드립니다.
        </div>

        <!-- 이미지 저장 시 노출되는 QR코드 영역 -->
        <div class="qr-section">
            <div class="qr-item">
                <img src="../../resource/qr/qr_sehwa_index.png" alt="메인 페이지 QR">
                <span>메인 페이지</span>
            </div>
            <div class="qr-item">
                <img src="../../resource/qr/qr_sehwa_2024achive.png" alt="2024 기록 QR">
                <span>2024 기록 유산</span>
            </div>
        </div>
    </div>

    <!-- 하단 바로가기 버튼 -->
    <div class="card-nav">
        <a href="index.html" target="_blank" class="card-nav-btn">메인 페이지</a>
        <a href="2024achive.html" target="" class="card-nav-btn">2024 기록 유산</a>
    </div>
</body>
</html>
